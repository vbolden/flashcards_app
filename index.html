<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flashcards App</title>
    <link rel="stylesheet" href="styles.css">
    <script src="app.js" defer></script>
</head>

<body>
    <header>
            <h1>Flashcards App</h1>
    </header>
    <div class="container">
        

        <main>
            <!-- Sidebar: Deck Management -->
            <aside class="sidebar">
                <div class="deck-controls">
                    <button id="newDeckBtn" class="btn btn-primary">+ New Deck</button>
                </div>
                <div class="deck-list" role="region" aria-label="Deck list">
                    <ul id="decksList"></ul>
                </div>
            </aside>

            <!-- Main Content: Deck View or Study Mode -->
            <section class="main-content">
                <!-- Empty State -->
                <div id="emptyState" class="empty-state">
                    <p>Select or create a deck to get started</p>
                </div>

                <!-- Deck View -->
                <div id="deckView" class="deck-view" hidden>
                    <div class="deck-header">
                        <div>
                            <h2 id="deckTitle"></h2>
                            <p id="deckCardCount" class="card-count"></p>
                        </div>
                        <div class="deck-actions">
                            <button id="editDeckBtn" class="btn btn-secondary">Edit</button>
                            <button id="studyBtn" class="btn btn-primary">Study</button>
                            <button id="deleteDeckBtn" class="btn btn-danger">Delete</button>
                        </div>
                    </div>

                    <div class="search-bar">
                        <label for="searchInput">Search cards:</label>
                        <input type="text" id="searchInput" placeholder="Search by front or back text...">
                    </div>

                    <div class="cards-container">
                        <div class="cards-list" id="cardsList"></div>
                    </div>

                    <button id="newCardBtn" class="btn btn-primary">+ New Card</button>
                </div>

                <!-- Study Mode -->
                <div id="studyMode" class="study-mode" hidden>
                    <button id="exitStudyBtn" class="btn btn-secondary">← Back</button>
                    <div class="study-controls">
                        <button id="shuffleBtn" class="btn btn-secondary">Shuffle</button>
                        <span id="cardCounter" class="card-counter"></span>
                    </div>

                    <div class="card-display">
                        <div id="flashcard" class="flashcard">
                            <div class="card-content">
                                <p id="cardText"></p>
                            </div>
                        </div>
                    </div>

                    <div class="study-navigation">
                        <button id="prevBtn" class="btn btn-secondary">← Previous</button>
                        <button id="flipBtn" class="btn btn-primary">Flip Card</button>
                        <button id="nextBtn" class="btn btn-secondary">Next →</button>
                    </div>
                </div>
            </section>
        </main>
